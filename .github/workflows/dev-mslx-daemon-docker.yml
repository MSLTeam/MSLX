name: 构建 & 推送 Dev 镜像

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  # Docker Hub 镜像名
  IMAGE_NAME: xiaoyululu/mslx-daemon
  # 腾讯云仓库地址 (香港)
  TENCENT_REGISTRY: hkccr.ccs.tencentyun.com

jobs:
  build-and-push-dev:
    name: 构建 & 推送 Dev 镜像
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Docker Hub ---
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # --- 腾讯云 (香港) ---
      - name: 登录腾讯云 TCR (香港)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TENCENT_REGISTRY }}
          username: ${{ secrets.TENCENT_DOCKER_USERNAME }}
          password: ${{ secrets.TENCENT_DOCKER_PASSWORD }}

      - name: 获取元数据 (严格锁定为 dev 标签)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ${{ env.TENCENT_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev

      - name: 多平台构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./MSLX.Daemon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=true

      - name: 触发 CNB 容器镜像同步
        env:
          CNB_REPO_SLUG: "mslmc/mslx-docker-push"
          CNB_TOKEN: ${{ secrets.CNB_DOCKER_REPO_TOKEN }}
        run: |
          echo "测试版 dev 镜像已成功推送到各大仓库，正在激活 CNB 镜像站进行增量中转同步..."
          
          curl -s -X POST \
            -H "Authorization: token $CNB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"event_type\": \"api_trigger_docker_sync\", \"ref\": \"refs/heads/main\"}" \
            "https://api.cnb.cool/${CNB_REPO_SLUG}/-/builds"
            
          echo "🎉 CNB 同转拉起成功！"