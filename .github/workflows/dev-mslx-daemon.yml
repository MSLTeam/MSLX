name: 构建 MSLX-Daemon Dev 版本 (依赖框架)

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build-frontend:
    name: 编译网页控制台
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 编译网页控制台Dev
        run: |
          cd ./MSLX.Webpanel
          pnpm install --no-frozen-lockfile
          pnpm build 

      - name: 暂存前端产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./MSLX.Daemon/Frontend/ 
          retention-days: 1 

  build-backend:
    needs: build-frontend
    runs-on: ubuntu-latest
    name: 构建发布
    strategy:
      matrix:
        include:
          - { os: linux,   arch: x64,   rid: linux-x64,   bin: 'MSLX-Daemon' }
          - { os: linux,   arch: arm64, rid: linux-arm64, bin: 'MSLX-Daemon' }
          - { os: linux,   arch: musl-x64,   rid: linux-musl-x64,   bin: 'MSLX-Daemon' }
          - { os: linux,   arch: musl-arm64, rid: linux-musl-arm64, bin: 'MSLX-Daemon' }
          - { os: windows, arch: x64,   rid: win-x64,     bin: 'MSLX-Daemon.exe' }
          - { os: windows, arch: arm64, rid: win-arm64,   bin: 'MSLX-Daemon.exe' }
          - { os: osx,     arch: x64,   rid: osx-x64,     bin: 'MSLX-Daemon' }
          - { os: osx,     arch: arm64, rid: osx-arm64,   bin: 'MSLX-Daemon' }

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./MSLX.Daemon/Frontend/ 
          merge-multiple: true

      - name: 设置 .NET 10 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 确定版本号名称
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF_TYPE == 'tag' ]]; then
            echo "VERSION_NAME=$GITHUB_REF_NAME" >> $GITHUB_ENV
          else
            echo "VERSION_NAME=dev" >> $GITHUB_ENV
          fi

      - name: 发布并提取单文件
        run: |
          BASE_NAME="MSLX-Daemon_${{ env.VERSION_NAME }}_${{ matrix.rid }}"
          PUBLISH_DIR="./publish_temp"
          DIST_DIR="./dist"
          mkdir -p $DIST_DIR
          
          dotnet publish ./MSLX.Daemon/MSLX.Daemon.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o "$PUBLISH_DIR"

          echo "正在处理纯净文件..."
          
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            cp "$PUBLISH_DIR/${{ matrix.bin }}" "$DIST_DIR/${{ matrix.bin }}"
            echo "UPLOAD_PATH=$DIST_DIR/${{ matrix.bin }}" >> $GITHUB_ENV
          else
            cd "$PUBLISH_DIR"
            chmod +x "${{ matrix.bin }}"
            tar -czvf "../$DIST_DIR/$BASE_NAME.tar.gz" "${{ matrix.bin }}"
            cd ..
            echo "UPLOAD_PATH=$DIST_DIR/$BASE_NAME.tar.gz" >> $GITHUB_ENV
          fi

          echo "ARTIFACT_NAME=$BASE_NAME" >> $GITHUB_ENV

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.UPLOAD_PATH }}
          if-no-files-found: error