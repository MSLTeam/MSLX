name: 发布 MSLX-Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: 构建并发布
    
    strategy:
      matrix:
        include:
          # 定义输出的程序文件名
          - { os: linux,   arch: x64,   rid: linux-x64,   bin: 'MSLX-Desktop' }
          - { os: linux,   arch: arm64, rid: linux-arm64, bin: 'MSLX-Desktop' }
          - { os: windows, arch: x64,   rid: win-x64,     bin: 'MSLX-Desktop.exe' }
          - { os: windows, arch: arm64, rid: win-arm64,   bin: 'MSLX-Desktop.exe' }
          - { os: osx,     arch: x64,   rid: osx-x64,     bin: 'MSLX-Desktop' }
          - { os: osx,     arch: arm64, rid: osx-arm64,   bin: 'MSLX-Desktop' }

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 .NET 10 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 确定版本号 (Tag vs Manual)
        id: version
        shell: bash
        run: |
          # 判断触发类型
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # 如果是 Tag 触发，使用 Tag 名称 (去掉 refs/tags/)
            echo "VERSION_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "这是正式 Release 构建: ${{ github.ref_name }}"
          else
            # 如果是手动触发，强制使用 beta
            echo "VERSION_NAME=beta" >> $GITHUB_ENV
            echo "这是手动触发构建，使用版本号: beta"
          fi

      - name: 编译发布文件
        run: |
          # 定义临时目录
          PUBLISH_DIR="./publish_temp"
          DIST_DIR="./dist"
          mkdir -p $PUBLISH_DIR
          mkdir -p $DIST_DIR
          
          # 执行 dotnet publish
          dotnet publish ./MSLX.Desktop/MSLX.Desktop.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --no-self-contained \
            -p:PublishSingleFile=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:CopyContentFiles=false \
            -o "$PUBLISH_DIR" \
            -p:IncludeNativeLibrariesForSelfExtract=true

          # 打包处理
          BASE_NAME="MSLX-Desktop_${{ env.VERSION_NAME }}_${{ matrix.rid }}"
          
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            # --- Windows: 打包成 ZIP ---
            ARCHIVE_NAME="$BASE_NAME.zip"
          
            # 进入目录打包
            # -j 参数：不包含目录路径 (Junk paths)，解压直接看到 exe
            cd "$PUBLISH_DIR"
            zip -j "../$DIST_DIR/$ARCHIVE_NAME" "${{ matrix.bin }}"
          
          else
            # --- Linux/macOS: 打包成 TAR.GZ ---
            ARCHIVE_NAME="$BASE_NAME.tar.gz"
          
            cd "$PUBLISH_DIR"
            chmod +x "${{ matrix.bin }}"
            # 打包
            # -C 切换目录，确保包内没有多余层级
            tar -czvf "../$DIST_DIR/$ARCHIVE_NAME" "${{ matrix.bin }}"
          fi
          
          # 将生成的包路径保存到环境变量
          echo "ASSET_PATH=./dist/$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 指定上传的文件
          files: ${{ env.ASSET_PATH }}
          tag_name: ${{ env.VERSION_NAME }}
          # 如果是 beta 版本，标记为预发布
          prerelease: ${{ env.VERSION_NAME == 'beta' }}

      - name: 同步上传到 CNB Release
        env:
          CNB_REPO_SLUG: "mslmc/mslx-releases"
          CNB_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}
          TAG_NAME: ${{ env.VERSION_NAME }}
        run: |
          echo "正在准备同步当前平台的产物到国内 CNB 节点..."
          
          if [[ "$TAG_NAME" == "beta" ]]; then
            echo "当前为手动测试构建，跳过 CNB 同步。"
            exit 0
          fi

          if [ ! -f "${{ env.ASSET_PATH }}" ]; then
            echo "❌ 错误：未找到生成的压缩包文件！"
            exit 1
          fi

          FILE_NAME=$(basename "${{ env.ASSET_PATH }}")
          FILE_SIZE=$(stat -c%s "${{ env.ASSET_PATH }}")

          # 1. 创建/获取 Release 页面。依照文档规范：POST /{repo}/-/releases
          # 我们把返回的 JSON 存在 create_res.json
          curl -s -X POST \
            -H "Authorization: token $CNB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${TAG_NAME}\", \"name\": \"Release ${TAG_NAME}\", \"body\": \"Synchronized from GitHub\"}" \
            "https://api.cnb.cool/${CNB_REPO_SLUG}/-/releases" > create_res.json

          # 如果已经存在该 Release，我们通过获取已存在的发布信息拿到它的唯一标识符 (ID)
          # CNB 也会返回带 id 的属性
          RELEASE_ID=$(jq -r '.id // empty' create_res.json)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            # 壳子已存在时，尝试去反查一下该 Release 的 ID
            echo "Release 壳子可能已存在，正在反查标识符..."
            curl -s -H "Authorization: token $CNB_TOKEN" \
              "https://api.cnb.cool/${CNB_REPO_SLUG}/-/releases" > list_res.json
            # 从列表里提取匹配当前 tag_name 的 id
            RELEASE_ID=$(jq -r --arg tag "$TAG_NAME" '.[] | select(.tag_name==$tag) | .id' list_res.json | head -n 1)
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "❌ 错误：未能获取到 CNB 的 Release ID。返回内容："
            cat create_res.json
            exit 1
          fi

          echo "✅ 成功对接 Release，ID 为: $RELEASE_ID"

          # 2. 获取附件上传地址。依照文档规范：POST /{repo}/-/releases/{release_id}/asset-upload-url
          curl -s -X POST \
            -H "Authorization: token $CNB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"asset_name\": \"${FILE_NAME}\", \"size\": ${FILE_SIZE}, \"overwrite\": true}" \
            "https://api.cnb.cool/${CNB_REPO_SLUG}/-/releases/${RELEASE_ID}/asset-upload-url" > url_res.json

          UPLOAD_URL=$(jq -r '.upload_url // empty' url_res.json)
          VERIFY_URL=$(jq -r '.verify_url // empty' url_res.json)

          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "❌ 错误：无法获取上传地址。返回内容："
            cat url_res.json
            exit 1
          fi

          # 3. 将文件 PUT 到上传地址
          echo "正在把文件 $FILE_NAME 推送到预签名高速通道..."
          curl -s -X PUT -T "${{ env.ASSET_PATH }}" "$UPLOAD_URL"

          # 4. 从 verify_url 提取 upload_token 和 asset_path
          # 文档明确说明确认接口路径包含这两个参数，直接请求 verify_url 本身或解析它即可：
          # 大多数云原生网关返回的 verify_url 就是一个可以直接 POST 确认的完整接口路径
          echo "正在确认附件上传状态..."
          CONFIRM_CODE=$(curl -s -o confirm_res.json -w "%{http_code}" -X POST \
            -H "Authorization: token $CNB_TOKEN" \
            "${VERIFY_URL}?ttl=0")

          if [ "$CONFIRM_CODE" -eq 200 ] || [ "$CONFIRM_CODE" -eq 201 ]; then
            echo "🎉 [${{ matrix.rid }}] 平台产物已稳妥关联到 CNB Release 页面！"
          else
            echo "❌ 错误：确认附件失败。状态码: $CONFIRM_CODE，返回内容："
            cat confirm_res.json
            exit 1
          fi