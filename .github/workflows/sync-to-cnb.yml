name: 同步代码分支到 CNB 主仓

on:
  push:
    branches:
      - 'master'
      - 'dev'
  workflow_dispatch: 

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    name: 镜像分支代码
    
    steps:
      - name: 签出完整代码历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          submodules: recursive

      - name: 推送当前分支到 CNB 对应分支
        env:
          CNB_REPO_SLUG: "mslmc/mslx"
          CNB_TOKEN: ${{ secrets.CNB_MAIN_REPO_TOKEN }}
        run: |
          echo "正在检查当前触发同步的分支状态..."
          
          CURRENT_BRANCH="${{ github.ref_name }}"
          echo "🚀 当前触发分支为: ${CURRENT_BRANCH}"
          
          CNB_GIT_ROUTE="${CNB_REPO_SLUG/\//\/\-\/}"
          
          AUTH_TOKEN=$(echo -n "cnb:${CNB_TOKEN}" | base64 | tr -d '\n')
          
          git config --global "http.https://cnb.cool/.extraheader" "Authorization: Basic ${AUTH_TOKEN}"
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          CNB_GIT_URL="https://cnb.cool/${CNB_GIT_ROUTE}.git"
          
          echo "⚡ 开始通过 Git 将 [${CURRENT_BRANCH}] 分支推至 CNB..."
          
          git push --force "$CNB_GIT_URL" "HEAD:refs/heads/${CURRENT_BRANCH}"
          
          echo "🎉 分支 [${CURRENT_BRANCH}] 同步至 CNB 主仓！"